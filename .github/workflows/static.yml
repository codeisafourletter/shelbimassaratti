name: Deploy static site to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build self-contained homepage
        run: |
          mkdir -p _site
          python - <<'PY'
          from pathlib import Path

          source = Path("index.html").read_text(encoding="utf-8")
          if source.startswith("---\n---\n"):
              source = source[8:]

          for filename in (
              "styles1.css",
              "styles2.css",
              "styles3.css",
              "body_part1.html",
              "body_part2.html",
              "body_part3.html",
              "script.js",
          ):
              marker = "{% include_relative " + filename + " %}"
              content = Path(filename).read_text(encoding="utf-8")
              if marker not in source:
                  raise RuntimeError(f"Missing build marker for {filename}")
              source = source.replace(marker, content)

          if "{% include_relative" in source:
              raise RuntimeError("Unresolved include marker remains in homepage")

          Path("_site/index.html").write_text(source, encoding="utf-8")
          PY

          cp press-kit.html privacy.html 404.html favicon.svg social-card.svg site.webmanifest robots.txt sitemap.xml CNAME _site/
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
